<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flâna — Événement</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --terre:#2C1810; --sable:#F5EDD6; --tuile:#C4602A; --mousse:#4A6741; --gris:#8A8070; --creme:#FBF7EE; }
html { scroll-behavior:smooth; }
body { background:var(--creme); color:var(--terre); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:0.8rem 2rem; background:rgba(251,247,238,0.96); backdrop-filter:blur(10px); border-bottom:1px solid rgba(44,24,16,0.07); }
.logo { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--terre); text-decoration:none; }
.logo em { color:var(--tuile); font-style:italic; }
.btn-back { font-size:0.8rem; color:var(--gris); text-decoration:none; display:flex; align-items:center; gap:0.4rem; transition:color .2s; }
.btn-back:hover { color:var(--tuile); }

/* BANNER */
.banner { height:6px; }

/* CONTENU */
.wrap { max-width:720px; margin:0 auto; padding:5.5rem 2rem 4rem; }

.evt-tag { font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; font-weight:500; display:flex; align-items:center; gap:6px; margin-bottom:0.8rem; }
.evt-dot { width:8px; height:8px; border-radius:50%; }

.evt-titre { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4vw,2.8rem); line-height:1.15; margin-bottom:1.5rem; }

/* INFOS BLOC */
.infos { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:2rem; }
.info-card { background:#fff; border-radius:14px; padding:1rem 1.1rem; border:1px solid rgba(44,24,16,.06); }
.info-icon { font-size:1.1rem; margin-bottom:0.35rem; }
.info-label { font-size:0.62rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gris); margin-bottom:0.2rem; }
.info-val { font-size:0.9rem; font-weight:500; line-height:1.4; }

/* DESCRIPTION */
.section-label { font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--tuile); font-weight:500; margin-bottom:0.6rem; }
.description { font-size:0.95rem; line-height:1.75; color:var(--terre); font-weight:300; margin-bottom:2rem; }

/* TARIF BADGE */
.tarif-badge { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; border-radius:99px; font-size:0.85rem; font-weight:500; margin-bottom:2rem; }
.tarif-badge.gratuit { background:#EAF3DE; color:#3B6D11; }
.tarif-badge.payant { background:#FAEEDA; color:#854F0B; }
.tarif-badge.libre { background:#EEEDFE; color:#534AB7; }

/* ACTIONS */
.actions { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:3rem; }
.btn-primary { background:var(--terre); color:var(--sable); padding:0.75rem 1.75rem; border-radius:99px; font-size:0.88rem; font-weight:500; text-decoration:none; transition:background .2s, transform .15s; display:inline-block; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-primary:hover { background:var(--tuile); transform:translateY(-2px); }
.btn-outline { border:1.5px solid rgba(44,24,16,0.18); color:var(--terre); padding:0.75rem 1.75rem; border-radius:99px; font-size:0.88rem; text-decoration:none; transition:border-color .2s, color .2s; display:inline-block; background:transparent; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-outline:hover { border-color:var(--tuile); color:var(--tuile); }

/* PARTAGE TOAST */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--terre); color:var(--sable); padding:0.6rem 1.25rem; border-radius:99px; font-size:0.82rem; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* AUTRES ÉVÉNEMENTS */
.autres { border-top:1px solid rgba(44,24,16,.08); padding-top:2rem; }
.autres h3 { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:1rem; }
.autres-liste { display:flex; flex-direction:column; gap:0.6rem; }
.autre-card { background:#fff; border-radius:12px; padding:0.9rem 1.1rem; border:1px solid rgba(44,24,16,.06); text-decoration:none; color:inherit; display:flex; justify-content:space-between; align-items:center; transition:transform .15s, box-shadow .15s; }
.autre-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(44,24,16,.08); }
.autre-info h4 { font-size:0.88rem; font-weight:500; margin-bottom:0.2rem; }
.autre-info p { font-size:0.75rem; color:var(--gris); }
.autre-dept { font-size:0.72rem; background:var(--sable); padding:0.2rem 0.6rem; border-radius:99px; color:var(--gris); flex-shrink:0; }

footer { border-top:1px solid rgba(44,24,16,.08); padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; font-size:0.72rem; color:var(--gris); max-width:720px; margin:0 auto; }
footer .logo { font-size:1.05rem; }

@media(max-width:600px) { .infos { grid-template-columns:1fr; } .actions { flex-direction:column; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Fl<em>â</em>na</a>
  <a href="evenements.html" class="btn-back">← Tous les événements</a>
</nav>

<div id="page-content"></div>

<div class="toast" id="toast">Lien copié ! 🎉</div>

<footer>
  <a href="index.html" class="logo">Fl<em>â</em>na</a>
  <div>Val de Loire · 37 · 49 · 86</div>
  <div>© 2025 Flâna</div>
</footer>

<script>
const COULEURS = { 'Brocante':'#4A6741','Marché':'#C4602A','Exposition':'#8A8070','Concert':'#6B9BD2','Atelier':'#B5813A','Fête locale':'#A05C7B','Sport':'#3A7B8C' };

const evenements = [
  // TOURS (37)
  { id:1, titre:"Braderie de Tours", type:"Brocante", dept:"37", ville:"Tours", date:"2025-09-07", heure_debut:"08:00", heure_fin:"18:00", tarif:"gratuit", prix:"", adresse:"Centre-ville", description:"La grande braderie annuelle de Tours envahit les rues du centre-ville. Des centaines de particuliers et professionnels exposent vêtements, mobilier, objets vintage et curiosités. Un incontournable de la rentrée tourangelle.", public:"tout_public" },
  { id:2, titre:"Marché de Noël de Tours", type:"Marché", dept:"37", ville:"Tours", date:"2025-12-05", heure_debut:"10:00", heure_fin:"20:00", tarif:"gratuit", prix:"", adresse:"Place de la Résistance", description:"Le marché de Noël de Tours transforme le centre-ville en village festif. Chalets artisanaux, spécialités régionales, animations et décorations lumineuses. Ouvert tous les jours de début décembre jusqu'à Noël.", public:"tout_public" },
  { id:3, titre:"Foire de Tours", type:"Fête locale", dept:"37", ville:"Tours", date:"2025-05-23", heure_debut:"10:00", heure_fin:"19:00", tarif:"payant", prix:"8€", adresse:"Parc des Expositions", description:"La Foire de Tours, l'une des plus grandes foires commerciales de la région Centre-Val de Loire. Exposants régionaux et nationaux, démonstrations, nouveautés maison et jardin. Un rendez-vous annuel incontournable.", public:"tout_public" },
  { id:4, titre:"Aucard de Tours", type:"Concert", dept:"37", ville:"Tours", date:"2025-06-11", heure_debut:"14:00", heure_fin:"23:59", tarif:"payant", prix:"Voir billetterie", adresse:"Parc de la Gloriette", description:"L'Aucard de Tours est le grand festival de musiques actuelles de la région, en plein air. Rock, électro, hip-hop, world music — plusieurs scènes et des centaines d'artistes sur plusieurs jours au bord de la Loire.", public:"adultes" },
  // CHINON (37)
  { id:5, titre:"Marché médiéval de Chinon", type:"Fête locale", dept:"37", ville:"Chinon", date:"2025-07-19", heure_debut:"10:00", heure_fin:"19:00", tarif:"gratuit", prix:"", adresse:"Centre historique", description:"Le marché médiéval de Chinon replonge la ville dans le Moyen Âge. Artisans en costume d'époque, démonstrations de métiers anciens, jongleurs et troubadours. Une fête historique et conviviale dans l'un des plus beaux centres médiévaux de la Loire.", public:"tout_public" },
  { id:6, titre:"Brocantes du dimanche", type:"Brocante", dept:"37", ville:"Chinon", date:"2025-05-18", heure_debut:"08:00", heure_fin:"17:00", tarif:"gratuit", prix:"", adresse:"Place Jeanne d'Arc", description:"Les brocantes dominicales de Chinon rythment les week-ends de printemps et d'été. Particuliers et chineurs réguliers se retrouvent place Jeanne d'Arc pour vendre et chiner mobilier, vaisselle, livres et objets du quotidien.", public:"tout_public" },
  // ANGERS (49)
  { id:7, titre:"Foire d'Angers", type:"Fête locale", dept:"49", ville:"Angers", date:"2025-04-25", heure_debut:"10:00", heure_fin:"19:00", tarif:"payant", prix:"7€", adresse:"Parc des Expositions d'Angers", description:"La Foire d'Angers rassemble chaque printemps exposants régionaux, artisans et entreprises du grand Ouest. Habitat, gastronomie, loisirs — un événement familial et commercial incontournable du Maine-et-Loire.", public:"tout_public" },
  { id:8, titre:"Les Accroche-Cœurs", type:"Concert", dept:"49", ville:"Angers", date:"2025-09-12", heure_debut:"14:00", heure_fin:"23:00", tarif:"gratuit", prix:"", adresse:"Centre-ville d'Angers", description:"Les Accroche-Cœurs envahissent Angers pour un festival de rue gratuit et spectaculaire. Acrobates, danseurs, musiciens et performeurs du monde entier investissent les places et ruelles du centre historique pendant trois jours.", public:"tout_public" },
  { id:9, titre:"Marché de Noël d'Angers", type:"Marché", dept:"49", ville:"Angers", date:"2025-12-06", heure_debut:"11:00", heure_fin:"20:00", tarif:"gratuit", prix:"", adresse:"Place du Ralliement", description:"Le marché de Noël d'Angers installe ses chalets place du Ralliement et alentours. Artisanat local, produits gourmands, vin chaud et animations pour les enfants. Une atmosphère chaleureuse au pied du château.", public:"tout_public" },
  // SAUMUR (49)
  { id:10, titre:"Anjou Vélo Vintage", type:"Sport", dept:"49", ville:"Saumur", date:"2025-06-07", heure_debut:"09:00", heure_fin:"18:00", tarif:"payant", prix:"Voir inscription", adresse:"Place de la Bilange", description:"Anjou Vélo Vintage rassemble chaque année des milliers de cyclistes déguisés pour une randonnée festive dans les vignes du Saumurois. Vélos anciens, tenues rétro et bonne humeur sont de rigueur.", public:"tout_public" },
  { id:11, titre:"Brocantes estivales de Saumur", type:"Brocante", dept:"49", ville:"Saumur", date:"2025-07-06", heure_debut:"08:00", heure_fin:"17:00", tarif:"gratuit", prix:"", adresse:"Bords de Loire", description:"Tout l'été, les brocantes s'installent sur les bords de Loire à Saumur. Une bonne occasion de chiner au grand air face au château, avec vue sur le fleuve. Ambiance détendue, entrée libre.", public:"tout_public" },
  // POITIERS (86)
  { id:12, titre:"Foire Expo de Poitiers", type:"Fête locale", dept:"86", ville:"Poitiers", date:"2025-05-30", heure_debut:"10:00", heure_fin:"19:00", tarif:"payant", prix:"6€", adresse:"Parc des Expositions", description:"La Foire Expo de Poitiers réunit chaque année exposants locaux et nationaux autour de l'habitat, du jardin, de la gastronomie et des loisirs. Un rendez-vous familial ancré dans la vie poitevine depuis des décennies.", public:"tout_public" },
  { id:13, titre:"Marché de Noël de Poitiers", type:"Marché", dept:"86", ville:"Poitiers", date:"2025-12-06", heure_debut:"11:00", heure_fin:"20:00", tarif:"gratuit", prix:"", adresse:"Place du Maréchal Leclerc", description:"Le marché de Noël de Poitiers transforme le centre-ville en village hivernal. Artisans, créateurs locaux, producteurs régionaux — une belle sélection de cadeaux et gourmandises dans une ambiance festive.", public:"tout_public" },
  { id:14, titre:"Les Expressifs — Arts de rue", type:"Concert", dept:"86", ville:"Poitiers", date:"2025-10-10", heure_debut:"14:00", heure_fin:"22:00", tarif:"gratuit", prix:"", adresse:"Centre-ville de Poitiers", description:"Les Expressifs investissent les rues de Poitiers pour un festival d'arts de rue gratuit. Théâtre, musique, danse, performance — des artistes du monde entier se produisent dans les places et ruelles du vieux Poitiers.", public:"tout_public" },
  // CHÂTELLERAULT (86)
  { id:15, titre:"Foire exposition de Châtellerault", type:"Fête locale", dept:"86", ville:"Châtellerault", date:"2025-04-05", heure_debut:"10:00", heure_fin:"19:00", tarif:"payant", prix:"5€", adresse:"Parc des Expositions", description:"La foire exposition de Châtellerault est le grand rendez-vous commercial du Châtelleraudais. Artisans, commerçants et entreprises régionales présentent leurs produits et savoir-faire sur plusieurs jours.", public:"tout_public" },
  { id:16, titre:"Brocantes locales de Châtellerault", type:"Brocante", dept:"86", ville:"Châtellerault", date:"2025-05-25", heure_debut:"08:00", heure_fin:"17:00", tarif:"gratuit", prix:"", adresse:"Centre-ville", description:"Les brocantes de printemps et d'été animent régulièrement le centre de Châtellerault. Particuliers et professionnels se retrouvent pour vendre meubles, livres, vêtements et objets de collection. Entrée libre.", public:"tout_public" },
];

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function publicLabel(p) {
  if (p === 'tout_public') return 'Tout public';
  if (p === 'adultes') return 'Plutôt adultes';
  if (p === 'enfants') return 'Spécial enfants';
  return p;
}

function tarifLabel(e) {
  if (e.tarif === 'gratuit') return { label:'Gratuit', cls:'gratuit' };
  if (e.tarif === 'libre') return { label:'Entrée libre', cls:'libre' };
  return { label: e.prix || 'Payant', cls:'payant' };
}

function partager() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast());
  } else {
    showToast();
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Lire l'id dans l'URL
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const evt = evenements.find(e => e.id === id);

if (!evt) {
  document.getElementById('page-content').innerHTML = `
    <div style="max-width:720px;margin:8rem auto 4rem;padding:0 2rem;text-align:center;">
      <p style="font-size:2rem;margin-bottom:1rem;">🔍</p>
      <h2 style="font-family:'Playfair Display',serif;margin-bottom:0.5rem;">Événement introuvable</h2>
      <p style="color:var(--gris);margin-bottom:1.5rem;">Cet événement n'existe pas ou a été supprimé.</p>
      <a href="evenements.html" style="color:var(--tuile);font-size:0.88rem;">← Voir tous les événements</a>
    </div>`;
} else {
  const couleur = COULEURS[evt.type] || '#8A8070';
  const tarif = tarifLabel(evt);
  const autres = evenements.filter(e => e.id !== evt.id && (e.dept === evt.dept || e.type === evt.type)).slice(0, 3);

  document.title = `Flâna — ${evt.titre}`;

  document.getElementById('page-content').innerHTML = `
    <div class="banner" style="background:${couleur}; margin-top:57px;"></div>
    <div class="wrap">
      <div class="evt-tag" style="color:${couleur}">
        <span class="evt-dot" style="background:${couleur}"></span>
        ${evt.type} · ${evt.ville} · Département ${evt.dept}
      </div>
      <h1 class="evt-titre">${evt.titre}</h1>

      <div class="infos">
        <div class="info-card">
          <div class="info-icon">📅</div>
          <div class="info-label">Date</div>
          <div class="info-val">${formatDate(evt.date)}</div>
        </div>
        <div class="info-card">
          <div class="info-icon">🕐</div>
          <div class="info-label">Horaires</div>
          <div class="info-val">${evt.heure_debut}${evt.heure_fin ? ' – ' + evt.heure_fin : ''}</div>
        </div>
        <div class="info-card">
          <div class="info-icon">📍</div>
          <div class="info-label">Lieu</div>
          <div class="info-val">${evt.adresse ? evt.adresse + ', ' : ''}${evt.ville}</div>
        </div>
        <div class="info-card">
          <div class="info-icon">👥</div>
          <div class="info-label">Public</div>
          <div class="info-val">${publicLabel(evt.public)}</div>
        </div>
      </div>

      <span class="tarif-badge ${tarif.cls}">${tarif.label === 'Gratuit' ? '✓ ' : ''}${tarif.label}</span>

      <div class="section-label">À propos</div>
      <p class="description">${evt.description}</p>

      <div class="actions">
        <a href="https://www.google.com/maps/search/${encodeURIComponent(evt.adresse + ' ' + evt.ville)}" target="_blank" class="btn-primary">📍 Voir sur la carte</a>
        <button class="btn-outline" onclick="partager()">🔗 Partager cet événement</button>
        <a href="evenements.html" class="btn-outline">← Tous les événements</a>
      </div>

      ${autres.length > 0 ? `
      <div class="autres">
        <h3>Dans le même coin</h3>
        <div class="autres-liste">
          ${autres.map(a => `
            <a href="evenement.html?id=${a.id}" class="autre-card">
              <div class="autre-info">
                <h4>${a.titre}</h4>
                <p>${formatDate(a.date)} · ${a.ville}</p>
              </div>
              <span class="autre-dept">${a.dept}</span>
            </a>
          `).join('')}
        </div>
      </div>` : ''}
    </div>`;
}
</script>
</body>
</html>
