<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flâna — Événement</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="canonical" href="https://www.flana.fr/evenement.html">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/flana.css">
<style>
.evt-banner { height: 6px; margin-top: 57px; }
.evt-wrap { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

.evt-tag { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; display: flex; align-items: center; gap: 6px; margin-bottom: 0.8rem; }
.evt-dot { width: 8px; height: 8px; border-radius: 50%; }
.evt-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,4vw,2.8rem); line-height: 1.15; margin-bottom: 0.75rem; }

/* BADGES */
.evt-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

/* INFOS */
.infos { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem; }
.info-card { background: var(--white); border-radius: 14px; padding: 1rem 1.1rem; border: 1px solid var(--border); }
.info-icon { font-size: 1.1rem; margin-bottom: 0.35rem; }
.info-label { font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gris); margin-bottom: 0.2rem; }
.info-val { font-size: 0.9rem; font-weight: 500; line-height: 1.4; }

/* DESCRIPTION */
.section-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--tuile); font-weight: 500; margin-bottom: 0.6rem; }
.description { font-size: 0.95rem; line-height: 1.75; color: var(--terre); font-weight: 300; margin-bottom: 2rem; }

/* ACTIONS */
.actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 3rem; }
.actions .btn-primary, .actions .btn-outline { font-size: 0.85rem; padding: 0.65rem 1.4rem; }

/* AUTRES */
.autres { border-top: 1px solid var(--border); padding-top: 2rem; }
.autres h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 1rem; }
.autres-liste { display: flex; flex-direction: column; gap: 0.6rem; }
.autre-card {
  background: var(--white); border-radius: 12px;
  padding: 0.9rem 1.1rem; border: 1px solid var(--border);
  text-decoration: none; color: inherit;
  display: flex; justify-content: space-between; align-items: center;
  transition: transform .15s, box-shadow .15s;
}
.autre-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.autre-info h4 { font-size: 0.88rem; font-weight: 500; margin-bottom: 0.2rem; }
.autre-info p { font-size: 0.75rem; color: var(--gris); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--terre); color: var(--sable);
  padding: 0.6rem 1.25rem; border-radius: var(--radius-pill);
  font-size: 0.82rem; opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media(max-width: 768px) {
  .evt-wrap { padding: 2rem 1rem 3rem; }
  .infos { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .actions { flex-direction: column; }
  .actions .btn-primary, .actions .btn-outline { text-align: center; }
}
@media(max-width: 400px) {
  .infos { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fl<em>â</em>na</a>
  <a href="evenements.html" class="btn-back">← Tous les événements</a>
</nav>

<div id="evt-banner" class="evt-banner"></div>
<div id="evt-content" class="evt-wrap"></div>

<div class="toast" id="toast">Lien copié ! 🎉</div>

<footer>
  <a href="index.html" class="footer-logo">Fl<em>â</em>na</a>
  <div>Val de Loire · 37 · 49 · 86</div>
  <div class="footer-links">
    <a href="a-propos.html">À propos</a>
    <a href="mentions-legales.html">Mentions légales</a>
    <span>© 2025 Flâna</span>
  </div>
</footer>

<script src="js/flana.js"></script>
<script src="js/preferences.js"></script>
<script>
function partager() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showToast);
  } else { showToast(); }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

(async () => {
  const allEvents = await FLANA.loadEvents();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const evt = allEvents.find(e => e.id === id);
  const content = document.getElementById('evt-content');
  const banner = document.getElementById('evt-banner');

  if (!evt) {
    content.innerHTML = `
      <div style="text-align:center;padding:4rem 0;">
        <p style="font-size:2rem;margin-bottom:1rem;">🔍</p>
        <h2 style="font-family:'Playfair Display',serif;margin-bottom:0.5rem;">Événement introuvable</h2>
        <p style="color:var(--gris);margin-bottom:1.5rem;">Cet événement n'existe pas ou a été supprimé.</p>
        <a href="evenements.html" style="color:var(--tuile);font-size:0.88rem;">← Voir tous les événements</a>
      </div>`;
    return;
  }

  const color = FLANA.colors[evt.type] || '#8A8070';
  const label = FLANA.labels[evt.type] || evt.type;
  const db = FLANA.dateBadge(evt.date);
  const tarifLabel = evt.isFree ? 'Gratuit' : (evt.price || 'Payant');
  const tarifCls = evt.isFree ? 'badge-green' : 'badge-orange';

  document.title = `Flâna — ${evt.title}`;
  banner.style.background = color;

  // Autres événements similaires
  const autres = allEvents
    .filter(e => e.id !== evt.id && (e.department === evt.department || e.type === evt.type))
    .sort((a,b) => new Date(a.date) - new Date(b.date))
    .slice(0, 3);

  content.innerHTML = `
    <div class="evt-tag" style="color:${color}">
      <span class="evt-dot" style="background:${color}"></span>
      ${label} · ${evt.city} · Département ${evt.department}
    </div>

    <h1 class="evt-title">${evt.title}</h1>

    <div class="evt-badges">
      <span class="badge badge-date ${db.cls}">${db.label}</span>
      <span class="badge ${tarifCls}">${evt.isFree ? '✓ ' : ''}${tarifLabel}</span>
      ${evt.isAssociation ? '<span class="badge badge-asso">🤝 Association</span>' : ''}
    </div>

    <div class="infos">
      <div class="info-card">
        <div class="info-icon">📅</div>
        <div class="info-label">Date</div>
        <div class="info-val">${FLANA.formatDate(evt.date)}</div>
      </div>
      <div class="info-card">
        <div class="info-icon">🕐</div>
        <div class="info-label">Horaires</div>
        <div class="info-val">${evt.time}${evt.endTime ? ' – ' + evt.endTime : ''}</div>
      </div>
      <div class="info-card">
        <div class="info-icon">📍</div>
        <div class="info-label">Lieu</div>
        <div class="info-val">${evt.city}${evt.address ? ', ' + evt.address : ''}</div>
      </div>
      <div class="info-card">
        <div class="info-icon">👤</div>
        <div class="info-label">Organisateur</div>
        <div class="info-val">${evt.organizer || 'Non précisé'}</div>
      </div>
    </div>

    <div class="section-label">À propos</div>
    <p class="description">${evt.description}</p>

    <div class="actions">
      <a href="https://www.google.com/maps/search/${encodeURIComponent(evt.city + ' ' + (evt.address || ''))}" target="_blank" class="btn-primary">📍 Voir sur la carte</a>
      <button class="btn-outline" onclick="partager()">🔗 Partager</button>
      <a href="evenements.html" class="btn-outline">← Tous les événements</a>
    </div>

    ${autres.length > 0 ? `
    <div class="autres">
      <h3>Dans le même coin</h3>
      <div class="autres-liste">
        ${autres.map(a => `
          <a href="evenement.html?id=${a.id}" class="autre-card">
            <div class="autre-info">
              <h4>${a.title}</h4>
              <p>${FLANA.formatDateShort(a.date)} · ${a.city}</p>
            </div>
            <span class="card-dept">${a.department}</span>
          </a>
        `).join('')}
      </div>
    </div>` : ''}
  `;

  // Init préférences
  const cities = FLANA.getCities(allEvents);
  const types = FLANA.getTypes(allEvents);
  PrefsModal.init(cities, types);
})();
</script>
</body>
</html>
