<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flâna — Événements Val de Loire</title>
<meta name="description" content="Tous les événements locaux du Val de Loire — brocantes, marchés, concerts dans les départements 37, 49 et 86.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="canonical" href="https://www.flana.fr/evenements.html">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/flana.css">
<style>
.page-header {
  padding: 6rem 2rem 1.5rem;
  max-width: 1200px;
  margin: 0 auto;
}
.page-header h1 { font-size: clamp(2rem,4vw,3rem); margin-bottom: 0.5rem; }

/* FILTRES */
.filtres-bar {
  position: sticky; top: 57px; z-index: 100;
  background: rgba(251,247,238,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 2rem;
}
.filtres-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.6rem; }
.filtres-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
.filtres-label { font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gris); font-weight: 500; min-width: 60px; }
.filtre-btn {
  padding: 0.32rem 0.8rem; border-radius: var(--radius-pill);
  border: 1.5px solid var(--border); font-size: 0.75rem;
  cursor: pointer; background: transparent; color: var(--terre);
  font-family: 'DM Sans', sans-serif; transition: all .15s;
}
.filtre-btn:hover { border-color: var(--tuile); color: var(--tuile); }
.filtre-btn.active { background: var(--terre); color: var(--sable); border-color: var(--terre); }
.filtre-sep { width: 1px; background: var(--border); margin: 0 0.25rem; align-self: stretch; }

/* SEARCH + COUNT */
.search-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 1rem 2rem 0;
  display: flex; gap: 1rem; align-items: center;
}
.search-bar .search-wrap { flex: 1; }
.results-count { font-size: 0.78rem; color: var(--gris); white-space: nowrap; }

/* GRILLE */
.events-wrap { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem 4rem; }

@media(max-width: 768px) {
  .page-header { padding: 5rem 1rem 1rem; }
  .filtres-bar { padding: 0.6rem 1rem; top: 53px; }
  .filtres-label { display: none; }
  .search-bar { padding: 0.75rem 1rem 0; flex-direction: column; align-items: stretch; }
  .events-wrap { padding: 1rem 1rem 3rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fl<em>â</em>na</a>
  <div class="nav-actions">
    <button class="btn-prefs" id="open-prefs">⚙️ Mes préférences</button>
    <a href="organise.html" class="btn-nav">+ Ajouter un événement</a>
  </div>
</nav>

<div class="page-header">
  <p class="section-tag">Val de Loire · 37 · 49 · 86</p>
  <h1>Les événements <em>du moment</em></h1>
  <p style="font-size:0.9rem;color:var(--gris);font-weight:300;">Brocantes, marchés, expos, concerts — vérifiés à la main, gratuits à découvrir.</p>
</div>

<!-- FILTRES -->
<div class="filtres-bar">
  <div class="filtres-inner">
    <div class="filtres-row">
      <span class="filtres-label">Dept.</span>
      <button class="filtre-btn active" data-filter="dept" data-value="">Tous</button>
      <button class="filtre-btn" data-filter="dept" data-value="37">37 — Indre-et-Loire</button>
      <button class="filtre-btn" data-filter="dept" data-value="49">49 — Maine-et-Loire</button>
      <button class="filtre-btn" data-filter="dept" data-value="86">86 — Vienne</button>
    </div>
    <div class="filtres-row">
      <span class="filtres-label">Type</span>
      <button class="filtre-btn active" data-filter="type" data-value="">Tous</button>
      <button class="filtre-btn" data-filter="type" data-value="brocante">🛍️ Brocante</button>
      <button class="filtre-btn" data-filter="type" data-value="marche">🥕 Marché</button>
      <button class="filtre-btn" data-filter="type" data-value="concert">🎵 Concert</button>
      <button class="filtre-btn" data-filter="type" data-value="exposition">🎨 Exposition</button>
      <button class="filtre-btn" data-filter="type" data-value="fete-locale">🎉 Fête locale</button>
      <button class="filtre-btn" data-filter="type" data-value="sport">🚴 Sport</button>
      <div class="filtre-sep"></div>
      <button class="filtre-btn" data-filter="free" data-value="true">✓ Gratuit</button>
      <button class="filtre-btn" data-filter="asso" data-value="true">🤝 Associations</button>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="Rechercher un événement, une ville...">
  </div>
  <div class="results-count" id="count"></div>
</div>

<!-- GRILLE -->
<div class="events-wrap">
  <div class="grid-3" id="grid"></div>
</div>

<footer>
  <a href="index.html" class="footer-logo">Fl<em>â</em>na</a>
  <div>Val de Loire · 37 · 49 · 86</div>
  <div class="footer-links">
    <a href="a-propos.html">À propos</a>
    <a href="mentions-legales.html">Mentions légales</a>
    <span>© 2025 Flâna</span>
  </div>
</footer>

<script src="js/flana.js"></script>
<script src="js/preferences.js"></script>
<script>
const filters = { dept: '', type: '', free: false, asso: false, search: '' };

// Lire les params URL
const params = new URLSearchParams(window.location.search);
if (params.get('dept')) filters.dept = params.get('dept');
if (params.get('type')) filters.type = params.get('type');
if (params.get('asso')) filters.asso = true;

let allEvents = [];

function render() {
  const prefs = FLANA.getPrefs();
  let liste = FLANA.filterEvents(allEvents, {
    dept: filters.dept,
    type: filters.type,
    isFree: filters.free || undefined,
    isAssociation: filters.asso || undefined,
    search: filters.search,
  });

  // Trier par préférences puis date
  liste = FLANA.sortByPrefs(liste, prefs);

  const grid = document.getElementById('grid');
  const count = document.getElementById('count');

  count.textContent = liste.length === 0 ? 'Aucun résultat' : `${liste.length} événement${liste.length > 1 ? 's' : ''}`;

  grid.innerHTML = liste.length
    ? liste.map(e => FLANA.renderCard(e)).join('')
    : FLANA.renderEmpty('Aucun événement ne correspond à vos filtres.<br>Essayez d\'élargir votre recherche.');
}

// Filtres boutons
document.querySelectorAll('.filtre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const filterType = btn.dataset.filter;
    const value = btn.dataset.value;

    if (filterType === 'free') {
      btn.classList.toggle('active');
      filters.free = btn.classList.contains('active');
    } else if (filterType === 'asso') {
      btn.classList.toggle('active');
      filters.asso = btn.classList.contains('active');
    } else {
      document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filters[filterType] = value;
    }
    render();
  });
});

// Activer les filtres URL
if (filters.dept) {
  const btn = document.querySelector(`[data-filter="dept"][data-value="${filters.dept}"]`);
  if (btn) { document.querySelectorAll('[data-filter="dept"]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
}
if (filters.type) {
  const btn = document.querySelector(`[data-filter="type"][data-value="${filters.type}"]`);
  if (btn) { document.querySelectorAll('[data-filter="type"]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
}
if (filters.asso) {
  const btn = document.querySelector('[data-filter="asso"]');
  if (btn) btn.classList.add('active');
}

// Recherche
document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value;
  render();
});

// Charger et afficher
(async () => {
  allEvents = await FLANA.loadEvents();
  const cities = FLANA.getCities(allEvents);
  const types = FLANA.getTypes(allEvents);
  PrefsModal.init(cities, types);
  window.refreshFeed = render;
  render();
})();
</script>
</body>
</html>
